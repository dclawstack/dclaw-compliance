replicaCount: 1

image:
  repository: ghcr.io/dclawstack/dclaw-compliance
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  port: 8124

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: compliance.dclawstack.io
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

postgresql:
  enabled: true
  auth:
    database: dclaw_compliance
    username: postgres
    password: postgres
  primary:
    persistence:
      enabled: true
      size: 10Gi

serviceAccount:
  create: true
  annotations: {}
  name: ""

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

podAnnotations: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
